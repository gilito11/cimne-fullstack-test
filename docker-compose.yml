services:
  neo4j:
    image: neo4j:4.4
    container_name: cimne-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-changeme123}"
      NEO4JLABS_PLUGINS: '["apoc", "n10s"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,n10s.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,n10s.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cimne-backend
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme123}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost:5173,http://localhost
      EXTERNAL_API_BASE: ${EXTERNAL_API_BASE:-https://crbcn-go-api.kube.tech.beegroup-cimne.com}
      EXTERNAL_API_EMAIL: ${EXTERNAL_API_EMAIL:-}
      EXTERNAL_API_PASSWORD: ${EXTERNAL_API_PASSWORD:-}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: cimne-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
